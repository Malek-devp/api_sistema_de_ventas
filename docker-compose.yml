services: 
  api:
    build: .
    container_name: api_de_sistema_ventas
    ports:
      - "2203:2203"
    volumes:
     -.:/app
     - /app/node_modules
    enviroment:
      NODE_ENV: development
    depends_on:
      - postgres
    
  postgres:
    image: postgres:13-alpine
    container_name: postgres_db
    ports:
      - "5432:5432"
    enviroment:
      POSTGRES_DB: api_sistema_de_ventas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: malek2003
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  pgadmin:
   image: dpage/pgadmin4
   container_name: pgadmin
   ports:
      - "5050:80"
   environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: malek2003
   depends_on:
      - postgres

volumes:
  postgres_data: